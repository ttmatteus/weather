<svg width="100%" height="100%" viewBox="0 0 360 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E335A" />
      <stop offset="50%" stop-color="#3B267B" />
      <stop offset="100%" stop-color="#1C1B33" />
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0.1" />
      <feBlend in="SourceGraphic" mode="overlay" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  <rect width="100%" height="100%" fill="white" opacity="0.06" filter="url(#noise)" />
</svg>
